permissions:
  contents: read
name: main-workflow

on:
  push:
    branches: [ main, develop, 'sprint/**', 'release/**']
  pull_request:
    branches: [ main, develop, 'sprint/**', 'release/**']

jobs:
  trigger-L0:
    uses: ./.github/workflows/L0-tests.yml
    with:
      caller_source: local

  trigger-L1:
    uses: ./.github/workflows/L1-tests.yml
    with:
      caller_source: local

  trigger-L2:
    if: false  # Disabled
    uses: ./.github/workflows/L2-tests.yml
    with:
      caller_source: local
