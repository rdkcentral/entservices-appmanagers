##############################################################################
# fuzz-testing.yml
#
# Automated libFuzzer-based fuzz testing for entservices-appmanagers.
#
# Behaviour
# ─────────
#   Called by tests-trigger.yml (main-workflow) on every push / PR,
#   exactly like L0-tests and L1-tests.
#
#   pull_request context → detect which plugin folders changed; fuzz only those
#                          (if fuzz/ or helpers/ changed → fuzz all folders)
#                          (no plugin changes → job is skipped gracefully)
#   push / other context → fuzz all 8 plugin folders
#   workflow_dispatch    → caller can pin target_scope, runs, max_total_time
#
# Artifacts retained
# ──────────────────
#   fuzz outputs are written under fuzz/stats/results/
##############################################################################

name: Fuzz Testing

on:
  workflow_call:
    inputs:
      caller_source:
        description: "Specifies the source type (e.g., local or test framework) for the workflow."
        required: true
        type: string

  workflow_dispatch:
    inputs:
      target_scope:
        description: >
          Comma-separated plugin folders to fuzz.
          Leave empty to fuzz all folders.
          Valid values: AppManager, AppStorageManager, DownloadManager,
          LifecycleManager, PackageManager, PreinstallManager,
          RDKWindowManager, TelemetryMetrics
        required: false
        default: ""
      runs:
        description: "Fuzzer iterations per target"
        required: false
        default: "500"
      max_total_time:
        description: "Max wall-clock seconds per target (0 = unlimited)"
        required: false
        default: "60"

##############################################################################
# Global defaults – overridable per event via env: blocks below
##############################################################################
env:
  ALL_PLUGIN_FOLDERS: "AppManager,AppStorageManager,DownloadManager,LifecycleManager,PackageManager,PreinstallManager,RDKWindowManager,TelemetryMetrics"
  ENTSERVICES_APIS_BRANCH: "topic/RDKEMW-16187"
  ENTSERVICES_APIS_REPO: "https://github.com/rdkcentral/entservices-apis.git"
  DEFAULT_RUNS: "2000"
  DEFAULT_MAX_TOTAL_TIME: "60"

jobs:
  ##########################################################################
  # PHASE 1 — determine which plugin folders need fuzzing
  ##########################################################################
  detect-scope:
    name: Detect fuzz scope
    runs-on: ubuntu-22.04
    outputs:
      scope: ${{ steps.detect.outputs.scope }}
      skip: ${{ steps.detect.outputs.skip }}
      runs: ${{ steps.detect.outputs.runs }}
      max_total_time: ${{ steps.detect.outputs.max_total_time }}

    steps:
      - name: Checkout (shallow + PR base for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed plugin folders and set scope
        id: detect
        shell: bash
        run: |
          ALL="${{ env.ALL_PLUGIN_FOLDERS }}"
          PLUGIN_LIST="AppManager AppStorageManager DownloadManager LifecycleManager PackageManager PreinstallManager RDKWindowManager TelemetryMetrics"

          # ── Iteration budget ──────────────────────────────────────────────
          # workflow_call inherits the caller's event; workflow_dispatch has its own inputs.
          # Detect workflow_dispatch by checking for its specific inputs.
          WD_SCOPE="${{ github.event.inputs.target_scope }}"
          WD_RUNS="${{ github.event.inputs.runs }}"
          WD_TIME="${{ github.event.inputs.max_total_time }}"

          if [[ -n "$WD_RUNS" ]]; then
            RUNS="$WD_RUNS"
            MAX_TOTAL_TIME="$WD_TIME"
          else
            RUNS="${{ env.DEFAULT_RUNS }}"
            MAX_TOTAL_TIME="${{ env.DEFAULT_MAX_TOTAL_TIME }}"
          fi

          # ── Scope detection ───────────────────────────────────────────────
          # Under workflow_call, github.event_name is 'workflow_call' but
          # github.event.pull_request is still populated for PR-triggered runs.
          PR_BASE="${{ github.event.pull_request.base.sha }}"
          PR_HEAD="${{ github.event.pull_request.head.sha }}"

          if [[ -n "$WD_SCOPE" ]]; then
            # workflow_dispatch with explicit scope
            SCOPE="$WD_SCOPE"
            echo "workflow_dispatch: using manually specified scope: $SCOPE"

          elif [[ -n "$PR_BASE" && -n "$PR_HEAD" ]]; then
            # PR context (direct pull_request trigger or called from PR-triggered workflow)
            CHANGED_FILES=$(git diff --name-only "$PR_BASE"..."$PR_HEAD" 2>/dev/null \
                            || git diff --name-only HEAD~1..HEAD)

            echo "Files changed in PR:"
            echo "$CHANGED_FILES"

            # If fuzz framework or shared helpers changed → test everything
            if echo "$CHANGED_FILES" | grep -qE "^(fuzz|helpers)/"; then
              SCOPE="$ALL"
              echo "fuzz/ or helpers/ changed → running all plugin scopes"
            else
              SCOPE=""
              for folder in $PLUGIN_LIST; do
                if echo "$CHANGED_FILES" | grep -qE "^${folder}/"; then
                  SCOPE="${SCOPE:+$SCOPE,}$folder"
                fi
              done

              if [[ -z "$SCOPE" ]]; then
                echo "No plugin source changes in this PR → skipping fuzz testing."
                echo "skip=true"  >> "$GITHUB_OUTPUT"
                echo "scope="     >> "$GITHUB_OUTPUT"
                echo "runs=$RUNS" >> "$GITHUB_OUTPUT"
                echo "max_total_time=$MAX_TOTAL_TIME" >> "$GITHUB_OUTPUT"
                exit 0
              fi

              echo "PR scope detected: $SCOPE"
            fi

          else
            # push or other non-PR context → run all
            SCOPE="$ALL"
            echo "Running full scope: $SCOPE"
          fi

          echo "skip=false"                      >> "$GITHUB_OUTPUT"
          echo "scope=$SCOPE"                    >> "$GITHUB_OUTPUT"
          echo "runs=$RUNS"                      >> "$GITHUB_OUTPUT"
          echo "max_total_time=$MAX_TOTAL_TIME"  >> "$GITHUB_OUTPUT"

  ##########################################################################
  # PHASE 2 — build fresh and run fuzz tests
  ##########################################################################
  fuzz-test:
    name: "Fuzz [${{ needs.detect-scope.outputs.scope }}]"
    needs: detect-scope
    if: needs.detect-scope.outputs.skip != 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    env:
      DEPENDENCIES_ROOT: ${{ github.workspace }}/dependencies
      TARGET_SCOPE: ${{ needs.detect-scope.outputs.scope }}
      RUNS: ${{ needs.detect-scope.outputs.runs }}
      MAX_TOTAL_TIME: ${{ needs.detect-scope.outputs.max_total_time }}
      RUN_ID: "ci-${{ github.run_id }}-${{ github.run_attempt }}"
      WORKFLOW_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      FUZZ_MERGE_CACHE_SCOPE: "${{ github.event.pull_request.number || github.ref_name }}"
      NON_INTERACTIVE: "1"
      FUZZ_CC: clang
      FUZZ_CXX: clang++
      ASAN_OPTIONS: "detect_leaks=0"
      BUILD_TIMEOUT_SEC: "3600"
      PIPELINE_TIMEOUT_SEC: "5400"

    steps:
      # ── 1. Source checkout ──────────────────────────────────────────────
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore merged fuzz generation cache (harness/stubs/seeds/reports)
        id: cache-fuzz-merge-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            fuzz/stats/auto/generated
            fuzz/stats/auto/stubs
            fuzz/stats/corpus
            fuzz/stats/results/reports
            fuzz/stats/results/fuzz_report.md
          key: fuzz-merge-${{ github.repository }}-${{ env.FUZZ_MERGE_CACHE_SCOPE }}
          restore-keys: |
            fuzz-merge-${{ github.repository }}-${{ env.FUZZ_MERGE_CACHE_SCOPE }}-

      # ── 2. Toolchain & system packages ─────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang \
            llvm \
            cmake \
            ninja-build \
            python3 \
            python3-pip \
            libjsoncpp-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            git \
            ca-certificates

      - name: Verify clang libFuzzer support
        run: |
          clang --version
          # Probe: libFuzzer provides its own main(), so we must provide LLVMFuzzerTestOneInput
          printf '#include <stdint.h>\n#include <stddef.h>\nextern "C" int LLVMFuzzerTestOneInput(const uint8_t *d, size_t s){return 0;}' \
            | clang++ -x c++ - \
              -fsanitize=fuzzer,address,undefined \
              -o /tmp/fuzz_probe
          echo "libFuzzer+ASan+UBSan probe compiled successfully"
          rm -f /tmp/fuzz_probe

      - name: Verify dependencies directory
        run: |
          echo "Checking DEPENDENCIES_ROOT: $DEPENDENCIES_ROOT"
          if [[ -d "$DEPENDENCIES_ROOT" ]]; then
            echo "✓ DEPENDENCIES_ROOT exists"
            ls -la "$DEPENDENCIES_ROOT" | head -20
          else
            echo "✗ DEPENDENCIES_ROOT does NOT exist at: $DEPENDENCIES_ROOT"
            echo "Will be created during clone step"
          fi

      # ── 3. External API headers ─────────────────────────────────────────
      - name: Cache entservices-apis headers
        id: cache-apis
        uses: actions/cache@v4
        with:
          path: ${{ env.DEPENDENCIES_ROOT }}/entservices-apis
          key: entservices-apis-${{ env.ENTSERVICES_APIS_BRANCH }}-v1

      - name: Clone entservices-apis (if not cached)
        if: steps.cache-apis.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$DEPENDENCIES_ROOT"
          git clone --depth=1 \
            --branch "${{ env.ENTSERVICES_APIS_BRANCH }}" \
            "${{ env.ENTSERVICES_APIS_REPO }}" \
            "$DEPENDENCIES_ROOT/entservices-apis"

      - name: Expose system jsoncpp headers in dependencies root
        run: |
          # CMakeLists.txt globs for  $DEPS_ROOT/*/json/json.h
          # System libjsoncpp-dev installs to /usr/include/jsoncpp/json/json.h
          # Create a symlink so the CMake glob resolves it.
          JSONCPP_HEADER="/usr/include/jsoncpp/json/json.h"
          if [[ -f "$JSONCPP_HEADER" ]]; then
            mkdir -p "$DEPENDENCIES_ROOT/jsoncpp"
            ln -sf /usr/include/jsoncpp/json \
                    "$DEPENDENCIES_ROOT/jsoncpp/json"
            echo "jsoncpp symlink created: $DEPENDENCIES_ROOT/jsoncpp/json → /usr/include/jsoncpp/json"
          else
            echo "System jsoncpp not found at $JSONCPP_HEADER; stubs will cover it"
          fi

      # ── 4. Clean build + fuzz run ───────────────────────────────────────
      - name: Run fuzz pipeline (discover → stubs → harnesses → build → fuzz → report)
        run: |
          echo "=== Fuzz Pipeline Configuration ==="
          echo "DEPENDENCIES_ROOT=$DEPENDENCIES_ROOT"
          echo "TARGET_SCOPE=$TARGET_SCOPE"
          echo "RUNS=$RUNS"
          echo "MAX_TOTAL_TIME=$MAX_TOTAL_TIME"
          echo "FUZZ_CC=$FUZZ_CC"
          echo "FUZZ_CXX=$FUZZ_CXX"
          echo "===================================="
          echo ""
          chmod +x "$GITHUB_WORKSPACE/fuzz/stats/auto_fuzz.sh" \
                   "$GITHUB_WORKSPACE/fuzz/stats/run_fuzz.sh"
          cd "$GITHUB_WORKSPACE"
          bash fuzz/stats/auto_fuzz.sh

      - name: Debug - Print generated CMakeLists.txt
        if: always()
        run: |
          echo "=== Generated CMakeLists.txt ===" 
          if [[ -f "fuzz/stats/auto/CMakeLists.txt" ]]; then
            head -40 fuzz/stats/auto/CMakeLists.txt
            echo "..."
            # Show the add_executable lines
            grep "add_executable" fuzz/stats/auto/CMakeLists.txt | head -15
            echo "..."
            tail -40 fuzz/stats/auto/CMakeLists.txt
          else
            echo "CMakeLists.txt not found"
          fi
          echo ""
          echo "=== Generated harness files ===" 
          if [[ -d "fuzz/stats/auto/generated" ]]; then
            ls -la fuzz/stats/auto/generated/ | head -20
            echo "Total harnesses: $(ls -1 fuzz/stats/auto/generated/*.cpp 2>/dev/null | wc -l)"
          else
            echo "No generated directory"
          fi
          echo ""
          echo "=== Build log (last 100 lines) ===" 
          if [[ -f "fuzz/stats/build/CMakeFiles/CMakeOutput.log" ]]; then
            tail -100 fuzz/stats/build/CMakeFiles/CMakeOutput.log
          elif [[ -d "fuzz/stats/build" ]]; then
            ls -la fuzz/stats/build/
          fi

      # ── 5. Summarise results in the workflow log ────────────────────────
      - name: Summarise fuzz results
        if: always()
        shell: bash
        run: |
          TRIAGE="$GITHUB_WORKSPACE/fuzz/stats/results/triage_results.json"
          RUN_RESULTS="$GITHUB_WORKSPACE/fuzz/stats/results/run_results.json"

          echo "### Fuzz Testing Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scope | \`$TARGET_SCOPE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Runs per target | $RUNS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Max time per target (s) | $MAX_TOTAL_TIME |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run ID | $RUN_ID |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ -f "$RUN_RESULTS" ]]; then
            python3 - "$RUN_RESULTS" "$TRIAGE" >> "$GITHUB_STEP_SUMMARY" <<'PY'
          import json, sys
          from pathlib import Path

          run_results_path = Path(sys.argv[1])
          triage_path = Path(sys.argv[2])

          run_data  = json.loads(run_results_path.read_text()) if run_results_path.exists() else {"targets": []}
          triage    = json.loads(triage_path.read_text())      if triage_path.exists()      else {"valid_crashes": [], "ignored_false_positives": 0}

          targets       = run_data.get("targets", [])
          total         = len(targets)
          passed        = sum(1 for t in targets if int(t.get("exit_code", 0) or 0) == 0)
          crashed       = total - passed
          valid_crashes = len(triage.get("valid_crashes", []))
          ignored       = triage.get("ignored_false_positives", 0)
          executions    = sum(t.get("executions", 0) for t in targets)

          print(f"| Targets run | {total} |")
          print(f"| Clean exits | {passed} |")
          print(f"| Non-zero exits | {crashed} |")
          print(f"| Valid crashes (in-scope) | **{valid_crashes}** |")
          print(f"| Ignored false positives | {ignored} |")
          print(f"| Total executions | {executions} |")
          PY
          fi

      # ── 6. Keep the job green even when crashes are found ───────────────
      - name: Report valid crashes without failing
        shell: bash
        run: |
          TRIAGE="$GITHUB_WORKSPACE/fuzz/stats/results/triage_results.json"
          if [[ ! -f "$TRIAGE" ]]; then
            echo "No triage_results.json found; treating as clean run."
            exit 0
          fi

          VALID=$(python3 -c "
          import json, sys
          d = json.load(open('$TRIAGE'))
          print(len(d.get('valid_crashes', [])))
          " 2>/dev/null || echo 0)

          if [[ "$VALID" -gt 0 ]]; then
            echo "::warning::$VALID valid in-scope crash(es) found by fuzz testing."
            echo "Crash inputs and reports are stored under fuzz/stats/results/."
            exit 0
          fi

          echo "No valid crashes detected — fuzz run clean."

      # ── 7. Upload fuzz results (reports + JSON outputs) ──────────────────
      - name: Upload fuzz results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-results-${{ github.run_id }}
          path: fuzz/stats/results/
          retention-days: 90
          if-no-files-found: ignore

      - name: Commit core fuzz results back to branch
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          RESULT_PATHS=(
            fuzz/stats/results/discovery_manifest.json
            fuzz/stats/results/dispatch_coverage_report.json
            fuzz/stats/results/run_results.json
            fuzz/stats/results/triage_results.json
            fuzz/stats/results/fuzz_report.md
            fuzz/stats/results/reports
          )

          for p in "${RESULT_PATHS[@]}"; do
            if [[ -e "$p" ]]; then
              # Results are intentionally ignored in git; use -f for CI commits.
              git add -f "$p"
            fi
          done

          if git diff --cached --quiet; then
            echo "No result/report changes to commit"
            exit 0
          fi

          git commit -m "fuzz(ci): update generated results and reports [skip ci]"
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"

      - name: Save merged fuzz generation cache (harness/stubs/seeds/reports)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            fuzz/stats/auto/generated
            fuzz/stats/auto/stubs
            fuzz/stats/corpus
            fuzz/stats/results/reports
            fuzz/stats/results/fuzz_report.md
          key: fuzz-merge-${{ github.repository }}-${{ env.FUZZ_MERGE_CACHE_SCOPE }}-${{ github.run_id }}-${{ github.run_attempt }}
