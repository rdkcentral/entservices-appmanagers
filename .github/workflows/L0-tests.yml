name: L0-tests

on:
  workflow_call:
    inputs:
      caller_source:
        description: "Specifies the source type (e.g., local or test framework) for the workflow."
        required: true
        type: string
    secrets:
      RDKCM_RDKE:
        required: true

permissions:
  contents: read

env:
  BUILD_TYPE: Debug
  THUNDER_REF: "R4.4.1"
  INTERFACES_REF: "topic/RDKEMW-14505"

jobs:
  L0-tests:
    name: Build and run L0 tests
    runs-on: ubuntu-22.04

    steps:
      - name: Set up cache
        if: ${{ !env.ACT }}
        id: cache
        uses: actions/cache@v3
        with:
          path: |
            thunder/build/Thunder
            thunder/build/entservices-apis
            thunder/build/ThunderTools
            thunder/install
            !thunder/install/etc/WPEFramework/plugins
            !thunder/install/usr/lib/wpeframework/plugins
          key: ${{ runner.os }}-${{ env.THUNDER_REF }}-${{ env.INTERFACES_REF }}-l0-runtime-1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - run: pip install jsonref

      - name: ACK External Trigger
        run: |
          echo "Message: External Trigger Received for L0 Tests"
          echo "Trigger Source: ${{ inputs.caller_source }}"

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1.13
        with:
          cmake-version: '3.16.x'

      - name: Install packages
        run: >
          sudo apt update
          &&
          sudo apt install -y libsqlite3-dev libcurl4-openssl-dev valgrind lcov clang libsystemd-dev libboost-all-dev libwebsocketpp-dev meson libcunit1 libcunit1-dev curl protobuf-compiler-grpc libgrpc-dev libgrpc++-dev libjsoncpp-dev gdb ninja-build libxtables-dev libip4tc-dev libip6tc-dev

      - name: Build trower-base64
        run: |
          if [ ! -d "trower-base64" ]; then
            git clone https://github.com/xmidt-org/trower-base64.git
          fi
          cd trower-base64
          meson setup --warnlevel 3 --werror build
          ninja -C build
          sudo ninja -C build install

      - name: Checkout entservices-appmanagers
        uses: actions/checkout@v3

      - name: Checkout Thunder
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v3
        with:
          repository: rdkcentral/Thunder
          path: Thunder
          ref: ${{env.THUNDER_REF}}

      - name: Checkout ThunderTools
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v3
        with:
          repository: rdkcentral/ThunderTools
          path: ThunderTools
          ref: R4.4.3

      - name: Checkout entservices-apis
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v3
        with:
          repository: rdkcentral/entservices-apis
          path: entservices-apis
          ref: ${{env.INTERFACES_REF}}

      - name: Apply patches ThunderTools
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd $GITHUB_WORKSPACE/ThunderTools
          patch -p1 < $GITHUB_WORKSPACE/Tests/patches/00010-R4.4-Add-support-for-project-dir.patch
          cd -

      - name: Build ThunderTools
        if: steps.cache.outputs.cache-hit != 'true'
        run: >
          cmake -G Ninja
          -S "$GITHUB_WORKSPACE/ThunderTools"
          -B build/ThunderTools
          -DEXCEPTIONS_ENABLE=ON
          -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/install/usr"
          -DCMAKE_MODULE_PATH="$GITHUB_WORKSPACE/install/tools/cmake"
          -DGENERIC_CMAKE_MODULE_PATH="$GITHUB_WORKSPACE/install/tools/cmake"
          &&
          cmake --build build/ThunderTools -j8
          &&
          cmake --install build/ThunderTools

      - name: Apply patches Thunder
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd $GITHUB_WORKSPACE/Thunder
          patch -p1 < $GITHUB_WORKSPACE/Tests/patches/Use_Legact_Alt_Based_On_ThunderTools_R4.4.3.patch
          patch -p1 < $GITHUB_WORKSPACE/Tests/patches/error_code_R4_4.patch
          patch -p1 < $GITHUB_WORKSPACE/Tests/patches/1004-Add-support-for-project-dir.patch
          patch -p1 < $GITHUB_WORKSPACE/Tests/patches/RDKEMW-733-Add-ENTOS-IDS.patch
          patch -p1 < $GITHUB_WORKSPACE/Tests/patches/Jsonrpc_dynamic_error_handling.patch
          cd -

      - name: Build Thunder
        if: steps.cache.outputs.cache-hit != 'true'
        run: >
          cmake -G Ninja
          -S "$GITHUB_WORKSPACE/Thunder"
          -B build/Thunder
          -DMESSAGING=ON
          -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/install/usr"
          -DCMAKE_MODULE_PATH="$GITHUB_WORKSPACE/install/tools/cmake"
          -DGENERIC_CMAKE_MODULE_PATH="$GITHUB_WORKSPACE/install/tools/cmake"
          -DBUILD_TYPE=Debug
          -DBINDING=127.0.0.1
          -DPORT=55555
          -DEXCEPTIONS_ENABLE=ON
          &&
          cmake --build build/Thunder -j8
          &&
          cmake --install build/Thunder

      - name: Apply patches entservices-apis
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd $GITHUB_WORKSPACE/entservices-apis
          patch -p1 < $GITHUB_WORKSPACE/Tests/patches/RDKEMW-1007.patch
          cd -

      - name: Build entservices-apis
        if: steps.cache.outputs.cache-hit != 'true'
        run: >
          cmake -G Ninja
          -S "$GITHUB_WORKSPACE/entservices-apis"
          -B build/entservices-apis
          -DEXCEPTIONS_ENABLE=ON
          -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/install/usr"
          -DCMAKE_MODULE_PATH="$GITHUB_WORKSPACE/install/tools/cmake"
          &&
          cmake --build build/entservices-apis -j8
          &&
          cmake --install build/entservices-apis

      - name: Ensure ConfigGenerator executable exists in local prefix (act/CI)
        run: |
          set -euo pipefail

          prefix="$GITHUB_WORKSPACE/install/usr"
          mkdir -p "$prefix/bin"

          if command -v "$prefix/bin/ConfigGenerator" >/dev/null 2>&1; then
            echo "ConfigGenerator already present at: $prefix/bin/ConfigGenerator"
            exit 0
          fi

          impl="$prefix/sbin/ConfigGenerator/config_generator.py"
          if [ ! -f "$impl" ]; then
            echo "ERROR: Expected ConfigGenerator python implementation not found at: $impl"
            find "$prefix" -maxdepth 4 -type f -name 'config_generator.py' -o -name 'ConfigGenerator' 2>/dev/null || true
            exit 1
          fi

          cat > "$prefix/bin/ConfigGenerator" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          PREFIX="$(cd "${SCRIPT_DIR}/.." && pwd)"
          exec python3 "${PREFIX}/sbin/ConfigGenerator/config_generator.py" "$@"
          EOF

          chmod +x "$prefix/bin/ConfigGenerator"

      - name: Ensure ConfigGenerator CMake package config exists in local prefix (act/CI)
        run: |
          set -euo pipefail

          prefix="$GITHUB_WORKSPACE/install/usr"
          pkgdir="$prefix/lib/cmake/ConfigGenerator"
          cfg="$pkgdir/ConfigGeneratorConfig.cmake"
          ver="$pkgdir/ConfigGeneratorConfigVersion.cmake"

          mkdir -p "$pkgdir"

          findmod="$(find "$prefix" -type f -name 'FindConfigGenerator.cmake' -print -quit 2>/dev/null || true)"
          findmod_dir=""
          if [ -n "${findmod}" ]; then
            findmod_dir="$(dirname "${findmod}")"
            echo "Found FindConfigGenerator.cmake at: ${findmod}"
          else
            echo "INFO: FindConfigGenerator.cmake not found under prefix: ${prefix} (continuing with tool-only fallback config)"
          fi

          echo "Generating ConfigGeneratorConfig.cmake at: $cfg"
          if [ -n "${findmod_dir}" ]; then
            cat > "$cfg" <<EOF
          include(CMakeFindDependencyMacro)

          set(_cg_module_dir "${findmod_dir}")
          get_filename_component(_cg_module_dir "\${_cg_module_dir}" ABSOLUTE)

          if(EXISTS "\${_cg_module_dir}/FindConfigGenerator.cmake")
            list(PREPEND CMAKE_MODULE_PATH "\${_cg_module_dir}")
          endif()

          find_package(ConfigGenerator REQUIRED MODULE)
          EOF
          else
            cat > "$cfg" <<'EOF'
          set(_cg_prefix "${CMAKE_CURRENT_LIST_DIR}/../../..")
          get_filename_component(_cg_prefix "${_cg_prefix}" ABSOLUTE)

          find_program(CONFIGGENERATOR_EXECUTABLE
            NAMES ConfigGenerator
            HINTS "${_cg_prefix}/bin" "${_cg_prefix}/sbin" "${_cg_prefix}/usr/bin" "${_cg_prefix}/usr/sbin"
          )

          if(NOT CONFIGGENERATOR_EXECUTABLE)
            message(FATAL_ERROR "ConfigGenerator executable not found under prefix: ${_cg_prefix}")
          endif()

          if(NOT TARGET ConfigGenerator::ConfigGenerator)
            add_executable(ConfigGenerator::ConfigGenerator IMPORTED GLOBAL)
            set_target_properties(ConfigGenerator::ConfigGenerator PROPERTIES
              IMPORTED_LOCATION "${CONFIGGENERATOR_EXECUTABLE}"
            )
          endif()

          if(NOT TARGET ConfigGenerator::configgenerator)
            add_executable(ConfigGenerator::configgenerator ALIAS ConfigGenerator::ConfigGenerator)
          endif()

          set(ConfigGenerator_FOUND TRUE)
          EOF
          fi

          if [ ! -f "$ver" ]; then
            cat > "$ver" <<'EOF'
          set(PACKAGE_VERSION "0.0.0")
          set(PACKAGE_VERSION_COMPATIBLE TRUE)
          set(PACKAGE_VERSION_EXACT FALSE)
          EOF
          fi

      - name: Sanity check ConfigGenerator package
        run: |
          set -euo pipefail
          test -f "$GITHUB_WORKSPACE/install/usr/lib/cmake/ConfigGenerator/ConfigGeneratorConfig.cmake"
          echo "Found ConfigGenerator CMake config"

      - name: Build plugins and stage artifacts
        run: |
          set -euo pipefail

          rm -rf "$GITHUB_WORKSPACE/build/entservices-appmanagers-l0"

          export CMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/install/usr${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}"
          export CMAKE_MODULE_PATH="$GITHUB_WORKSPACE/install/tools/cmake${CMAKE_MODULE_PATH:+:$CMAKE_MODULE_PATH}"
          export PATH="$GITHUB_WORKSPACE/install/usr/bin:$PATH"
          # RuntimeManager sources include <json/json.h>; point compiler to jsoncpp headers.
          export RUNTIME_MANAGER_INCLUDES="/usr/include/jsoncpp"

          cmake -G Ninja \
            -S "$GITHUB_WORKSPACE" \
            -B build/entservices-appmanagers-l0 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-DUSE_THUNDER_R4 -DTHUNDER_VERSION=4 -DTHUNDER_VERSION_MAJOR=4 -DTHUNDER_VERSION_MINOR=4 -I$GITHUB_WORKSPACE/helpers -I$GITHUB_WORKSPACE/helpers/Telemetry -iquote $GITHUB_WORKSPACE/RuntimeManager" \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH" \
            -DCMAKE_MODULE_PATH="$CMAKE_MODULE_PATH" \
            -DGENERIC_CMAKE_MODULE_PATH="$GITHUB_WORKSPACE/install/tools/cmake" \
            -DConfigGenerator_DIR="$GITHUB_WORKSPACE/install/usr/lib/cmake/ConfigGenerator" \
            -DWPEFrameworkPlugins_DIR="$GITHUB_WORKSPACE/install/usr/lib/cmake/WPEFrameworkPlugins" \
            -DDISABLE_SECURITY_TOKEN=ON \
            -DUSE_THUNDER_R4=ON \
            -DPLUGIN_RUNTIME_MANAGER=ON \
            -DPLUGIN_APPMANAGER=OFF \
            -DPLUGIN_APP_STORAGE_MANAGER=ON \
            -DPLUGIN_LIFECYCLE_MANAGER=ON \
            -DPLUGIN_DOWNLOADMANAGER=OFF \
            -DPLUGIN_PREINSTALL_MANAGER=OFF \
            -DPLUGIN_PACKAGE_MANAGER=OFF \
            -DPLUGIN_RDK_WINDOW_MANAGER=OFF \
            -DPLUGIN_TELEMETRYMETRICS=OFF \
            -DCMAKE_VERBOSE_MAKEFILE=ON

          cmake --build build/entservices-appmanagers-l0 -- -j"$(nproc)"

          mkdir -p "$GITHUB_WORKSPACE/install/usr/lib/wpeframework/plugins"
          find build/entservices-appmanagers-l0 -type f \( \
            -name "libRuntimeManager.so*" -o -name "libWPEFrameworkRuntimeManager.so*" -o \
            -name "libWPEFrameworkRuntimeManagerImplementation.so*" -o -name "libRuntimeManagerImplementation.so*" -o \
            -name "libLifecycleManager.so*" -o -name "libWPEFrameworkLifecycleManager.so*" -o \
            -name "libWPEFrameworkLifecycleManagerImplementation.so*" -o -name "libLifecycleManagerImplementation.so*" -o \
            -name "libAppStorageManager.so*" -o -name "libWPEFrameworkAppStorageManager.so*" -o \
            -name "libWPEFrameworkAppStorageManagerImplementation.so*" -o -name "libAppStorageManagerImplementation.so*" -o \
            -name "libRDKWindowManager.so*" -o -name "libWPEFrameworkRDKWindowManager.so*" -o \
            -name "libWPEFrameworkRDKWindowManagerImplementation.so*" -o -name "libRDKWindowManagerImplementation.so*" \
          \) -exec cp -f {} "$GITHUB_WORKSPACE/install/usr/lib/wpeframework/plugins/" \; 2>/dev/null || true

      - name: Build L0 tests (Tests/L0Tests)
        run: |
          set -euo pipefail

          rm -rf "$GITHUB_WORKSPACE/build/entservices-appmanagers-l0tests-only"

          export CMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/install/usr${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}"
          export CMAKE_MODULE_PATH="$GITHUB_WORKSPACE/install/tools/cmake${CMAKE_MODULE_PATH:+:$CMAKE_MODULE_PATH}"
          export PREFIX="$GITHUB_WORKSPACE/install/usr"

          cmake -G Ninja \
            -S "$GITHUB_WORKSPACE/Tests/L0Tests" \
            -B build/entservices-appmanagers-l0tests-only \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH" \
            -DCMAKE_MODULE_PATH="$CMAKE_MODULE_PATH" \
            -DGENERIC_CMAKE_MODULE_PATH="$GITHUB_WORKSPACE/install/tools/cmake" \
            -DPREFIX="$PREFIX" \
            -DPLUGIN_RUNTIME_MANAGER=ON \
            -DPLUGIN_LIFECYCLE_MANAGER=ON \
            -DPLUGIN_RDK_WINDOW_MANAGER=ON \
            -DPLUGIN_APP_STORAGE_MANAGER=ON \
            -DAPPMGR_ENABLE_COVERAGE=ON \
            -DAPPLCM_ENABLE_COVERAGE=ON \
            -DAPPWM_ENABLE_COVERAGE=ON \
            -DAPPASM_ENABLE_COVERAGE=ON

          cmake --build build/entservices-appmanagers-l0tests-only --target runtimemanager_l0test lifecyclemanager_l0test rdkwindowmanager_l0test appstorage_l0test -- -j"$(nproc)"

      - name: Run L0 tests
        id: run_l0_tests
        continue-on-error: true
        run: |
          set -euo pipefail

          export PATH="$GITHUB_WORKSPACE/install/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/install/usr/lib:$GITHUB_WORKSPACE/install/usr/lib/wpeframework:$GITHUB_WORKSPACE/install/usr/lib/wpeframework/plugins:${LD_LIBRARY_PATH:-}"

          runtime_test_bin="build/entservices-appmanagers-l0tests-only/runtimemanager_l0test"
          lcm_test_bin="build/entservices-appmanagers-l0tests-only/lifecyclemanager_l0test"
          rdkwm_test_bin="build/entservices-appmanagers-l0tests-only/rdkwindowmanager_l0test"
          appstorage_test_bin="build/entservices-appmanagers-l0tests-only/appstorage_l0test"

          test -x "$runtime_test_bin"
          test -x "$lcm_test_bin"
          test -x "$rdkwm_test_bin"
          test -x "$appstorage_test_bin"

          run_one_under_gdb() {
            local bin="$1"
            local log="$2"
            local gdb_log="$3"

            local gdb_cmd_file
            gdb_cmd_file=$(mktemp /tmp/gdb_l0_cmds.XXXXXX)
            cat > "$gdb_cmd_file" << 'GDBEOF'
          set pagination off
          set print pretty on
          set confirm off
          set breakpoint pending on
          set unwindonsignal on
          handle SIGPIPE nostop noprint pass
          python
          import gdb
          _crash_signal = [None]
          _inf_exit_code = [None]

          def _stop_handler(event):
              if isinstance(event, gdb.SignalEvent):
                  _crash_signal[0] = event.stop_signal

          def _exit_handler(event):
              _inf_exit_code[0] = event.exit_code

          gdb.events.stop.connect(_stop_handler)
          gdb.events.exited.connect(_exit_handler)
          end
          handle SIGSEGV stop print nopass
          handle SIGABRT stop print nopass
          handle SIGILL  stop print nopass
          handle SIGFPE  stop print nopass
          handle SIGBUS  stop print nopass
          run
          python
          import gdb
          sig = _crash_signal[0]
          if sig:
              print("\n\n========== GDB CRASH REPORT ==========")
              print("Signal caught: " + str(sig))
              print("--- Crashed thread backtrace (full) ---")
              gdb.execute("bt full")
              print("\n--- All threads backtrace ---")
              gdb.execute("thread apply all bt full")
              print("=======================================")
              gdb.execute("quit 1")
          else:
              code = _inf_exit_code[0] or 0
              gdb.execute("quit %d" % code)
          end
          GDBEOF

            echo "Running under gdb with live output: $bin"
            set +e
            gdb --batch -x "$gdb_cmd_file" --args "$bin" 2>&1 | tee "$log"
            local rc=${PIPESTATUS[0]}
            set -e

            cp "$log" "$gdb_log" 2>/dev/null || true
            rm -f "$gdb_cmd_file"
            return "$rc"
          }

          runtime_test_rc=0
          lcm_test_rc=0
          rdkwm_test_rc=0
          appstorage_test_rc=0

          run_one_under_gdb "$runtime_test_bin" l0-runtime-test.log l0-runtime-test-gdb.log || runtime_test_rc=$?
          run_one_under_gdb "$lcm_test_bin" l0-lcm-test.log l0-lcm-test-gdb.log || lcm_test_rc=$?
          run_one_under_gdb "$rdkwm_test_bin" l0-rdkwm-test.log l0-rdkwm-test-gdb.log || rdkwm_test_rc=$?
          run_one_under_gdb "$appstorage_test_bin" l0-appstorage-test.log l0-appstorage-test-gdb.log || appstorage_test_rc=$?

          cat l0-runtime-test.log l0-lcm-test.log l0-rdkwm-test.log l0-appstorage-test.log > l0-test.log

          if [ "$runtime_test_rc" -ne 0 ] || [ "$lcm_test_rc" -ne 0 ] || [ "$rdkwm_test_rc" -ne 0 ] || [ "$appstorage_test_rc" -ne 0 ]; then
            exit 1
          fi

      - name: Summarize failed tests
        if: ${{ always() }}
        run: |
          set -euo pipefail
          for log in l0-runtime-test.log l0-lcm-test.log l0-rdkwm-test.log l0-appstorage-test.log; do
            if [ -f "$log" ]; then
              echo "==== $log: Failed test cases (if any) ===="
              grep -E '^\[  FAILED  \]' "$log" || echo "No explicit [ FAILED ] lines found"
            else
              echo "$log not found"
            fi
          done

      - name: Fail workflow if tests failed
        if: ${{ always() }}
        env:
          RUN_L0_TESTS_OUTCOME: ${{ steps.run_l0_tests.outcome }}
        run: |
          set -euo pipefail
          failed=0

          if [ "${RUN_L0_TESTS_OUTCOME}" != "success" ]; then
            echo "L0 test execution step failed (non-zero exit)"
            failed=1
          fi

          for log in l0-runtime-test.log l0-lcm-test.log l0-rdkwm-test.log l0-appstorage-test.log; do
            if [ -f "$log" ]; then
              echo "==== $log: Failed test cases (final gate) ===="
              grep -E '^\[  FAILED  \]' "$log" || true
              grep -E '^FAIL:' "$log" || true
            else
              echo "$log not found in final gate"
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi


      - name: Generate coverage report (lcov + HTML via genhtml)
        continue-on-error: true
        run: |
          set -euo pipefail

          ARTIFACT_ROOT="$GITHUB_WORKSPACE"
          rm -rf "$ARTIFACT_ROOT/coverage" coverage.info filtered_coverage.info || true
          mkdir -p "$ARTIFACT_ROOT/coverage"

          build_dir="$GITHUB_WORKSPACE/build/entservices-appmanagers-l0tests-only"

          lcov -c -o coverage.info -d "$build_dir" || true

          if [ ! -s coverage.info ]; then
            echo "coverage.info missing/empty; skipping filtering + HTML generation"
            exit 0
          fi

          lcov \
            -r coverage.info \
            '/usr/include/*' \
            '*/install/usr/include/*' \
            '*/Tests/L0Tests/*' \
            '*/Thunder/*' \
            -o filtered_coverage.info || true

          if [ ! -s filtered_coverage.info ]; then
            echo "filtered_coverage.info missing/empty; skipping HTML generation"
            exit 0
          fi

          genhtml \
            -o "$ARTIFACT_ROOT/coverage" \
            -t "entservices-appmanagers L0 coverage" \
            filtered_coverage.info || true

      - name: Upload artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-L0-appmanagers
          path: |
            coverage/
            coverage.info
            filtered_coverage.info
            l0-test.log
            l0-runtime-test.log
            l0-lcm-test.log
            l0-rdkwm-test.log
            l0-appstorage-test.log
            l0-runtime-test-gdb.log
            l0-lcm-test-gdb.log
            l0-rdkwm-test-gdb.log
            l0-appstorage-test-gdb.log
          if-no-files-found: warn

